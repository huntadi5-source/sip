<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sip">
<title>Sip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,200;1,9..144,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ede9e1;
    --border: #ddd8ce;
    --text: #2d2a24;
    --text-mid: #7a756b;
    --text-light: #b0aa9e;
    --green-1: #5a9e5a;
    --green-2: #7ec87e;
    --green-3: #a8d8a8;
    --yellow: #c8b060;
    --brown: #a07840;
    --dead: #887050;
    --accent: #5a9e5a;
    --pot: #d8d0c0;
    --pot-dark: #c8c0b0;
    --soil: #b0a090;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* SETUP SCREEN */
  #setup-screen {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 60px 32px 40px;
  }

  #setup-screen h1 {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-size: 38px;
    line-height: 1.15;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  #setup-screen h1 em {
    font-style: italic;
    color: var(--accent);
  }

  #setup-screen .subtitle {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 52px;
  }

  .field {
    margin-bottom: 28px;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 10px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text);
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }

  .field .hint {
    font-size: 10px;
    color: var(--text-light);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .row-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .btn-primary {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .btn-primary:active { opacity: 0.7; }

  /* MAIN SCREEN */
  #main-screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 56px 28px 20px;
  }

  .app-name {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-style: italic;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .weather-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.05em;
  }

  /* PLANT AREA */
  .plant-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  .plant-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #plant-svg {
    transition: all 0.8s ease;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.06));
  }

  .plant-status {
    text-align: center;
    margin-top: 28px;
  }

  .plant-status .status-label {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    color: var(--text);
    display: block;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .plant-status .status-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* SCORE BAR */
  .score-section {
    padding: 0 28px 20px;
  }

  .score-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .score-header .score-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .score-header .score-value {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-size: 22px;
    color: var(--text);
  }

  .score-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease, background 0.8s ease;
  }

  /* FACTORS */
  .factors {
    padding: 0 28px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .factor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }

  .factor-card .f-icon {
    font-size: 20px;
    display: block;
    margin-bottom: 4px;
  }

  .factor-card .f-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    display: block;
    margin-bottom: 2px;
  }

  .factor-card .f-value {
    font-size: 12px;
    color: var(--text);
    font-weight: 400;
  }

  /* BOTTOM ACTIONS */
  .bottom-actions {
    padding: 16px 28px 44px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-drink {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.15s, opacity 0.15s;
  }

  .btn-drink:active {
    transform: scale(0.97);
    opacity: 0.8;
  }

  .btn-drink .drink-icon {
    font-size: 18px;
  }

  .last-drink {
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.05em;
  }

  .settings-link {
    text-align: center;
    font-size: 10px;
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* RIPPLE on drink button */
  @keyframes plantPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .pulse {
    animation: plantPulse 0.4s ease;
  }

  /* Ambient glow behind plant based on health */
  .plant-glow {
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.25;
    transition: background 1s ease, opacity 1s ease;
    z-index: 0;
  }

  .plant-container svg {
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <h1>Hello,<br><em>let's keep<br>you hydrated.</em></h1>
  <p class="subtitle">A living reminder</p>

  <div class="field">
    <label>Your weight</label>
    <div class="row-fields">
      <input type="number" id="weight" placeholder="65" inputmode="numeric">
      <select id="weight-unit">
        <option value="kg">kg</option>
        <option value="lb">lb</option>
      </select>
    </div>
    <p class="hint">Used to calculate your daily water need</p>
  </div>

  <div class="field">
    <label>Wake up time</label>
    <input type="time" id="wake-time" value="07:00">
  </div>

  <div class="field">
    <label>Sleep time</label>
    <input type="time" id="sleep-time" value="23:00">
  </div>

  <button class="btn-primary" onclick="startApp()">Meet your plant →</button>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <div class="top-bar">
    <span class="app-name">sip.</span>
    <div class="weather-pill">
      <span id="weather-icon">🌡</span>
      <span id="weather-text">fetching...</span>
    </div>
  </div>

  <div class="plant-area">
    <div class="plant-container">
      <div class="plant-glow" id="plant-glow"></div>
      <svg id="plant-svg" width="160" height="220" viewBox="0 0 160 220"></svg>
    </div>
    <div class="plant-status">
      <span class="status-label" id="status-label">Thriving</span>
      <span class="status-sub" id="status-sub">fully hydrated</span>
    </div>
  </div>

  <div class="score-section">
    <div class="score-header">
      <span class="score-label">Hydration need</span>
      <span class="score-value" id="score-display">0%</span>
    </div>
    <div class="score-bar-track">
      <div class="score-bar-fill" id="score-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="factors">
    <div class="factor-card">
      <span class="f-icon">🌡</span>
      <span class="f-label">Temp</span>
      <span class="f-value" id="f-temp">—</span>
    </div>
    <div class="factor-card">
      <span class="f-icon">⏱</span>
      <span class="f-label">Since last</span>
      <span class="f-value" id="f-time">—</span>
    </div>
    <div class="factor-card">
      <span class="f-icon">💧</span>
      <span class="f-label">Today</span>
      <span class="f-value" id="f-glasses">0 gl</span>
    </div>
  </div>

  <div class="bottom-actions">
    <button class="btn-drink" onclick="logDrink()">
      <span class="drink-icon">💧</span>
      <span>I just drank water</span>
    </button>
    <div class="last-drink" id="last-drink-text">No drinks logged yet today</div>
    <div class="settings-link" onclick="resetApp()">settings / reset</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
let state = {
  weight: 65,
  weightUnit: 'kg',
  wakeTime: '07:00',
  sleepTime: '23:00',
  lastDrink: null,
  glassesToday: 0,
  lastDrinkDate: null,
  weatherTemp: null,
  weatherDesc: '',
  score: 0,
};

// ─── INIT ─────────────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('sip_state');
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...state, ...parsed };
    // Reset glasses if new day
    const today = new Date().toDateString();
    if (state.lastDrinkDate !== today) {
      state.glassesToday = 0;
      state.lastDrink = null;
      state.lastDrinkDate = today;
    }
    showMain();
  }
};

function saveState() {
  localStorage.setItem('sip_state', JSON.stringify(state));
}

// ─── SETUP ────────────────────────────────────────────────
function startApp() {
  const weightInput = document.getElementById('weight').value.trim();
  const w = parseFloat(weightInput);
  
  // Default to 65kg if empty, validate range if entered
  if (weightInput === '' ) {
    state.weight = 65;
  } else if (!w || w < 10 || w > 500) {
    showToast('Enter a valid weight (e.g. 60)');
    return;
  } else {
    state.weight = w;
  }

  state.weightUnit = document.getElementById('weight-unit').value || 'kg';
  state.wakeTime = document.getElementById('wake-time').value || '07:00';
  state.sleepTime = document.getElementById('sleep-time').value || '23:00';
  state.lastDrinkDate = new Date().toDateString();
  state.glassesToday = 0;
  state.lastDrink = null;
  saveState();
  showMain();
}

function showMain() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
  fetchWeather();
  updateAll();
  setInterval(updateAll, 60000); // update every minute
}

function resetApp() {
  if (confirm('Reset all settings?')) {
    localStorage.removeItem('sip_state');
    location.reload();
  }
}

// ─── WEATHER ──────────────────────────────────────────────
function fetchWeather() {
  if (!navigator.geolocation) { state.weatherTemp = 28; updateAll(); return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      const { latitude, longitude } = pos.coords;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weathercode&timezone=auto`;
      const res = await fetch(url);
      const data = await res.json();
      state.weatherTemp = Math.round(data.current.temperature_2m);
      state.weatherCode = data.current.weathercode;
      saveState();
      updateAll();
    } catch(e) {
      state.weatherTemp = 28; // fallback for Maharashtra
      updateAll();
    }
  }, () => {
    state.weatherTemp = 28;
    updateAll();
  });
}

function weatherEmoji(code) {
  if (!code && code !== 0) return '🌤';
  if (code === 0) return '☀️';
  if (code <= 3) return '🌤';
  if (code <= 48) return '🌫';
  if (code <= 67) return '🌧';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌦';
  if (code <= 99) return '⛈';
  return '🌤';
}

// ─── SCORE CALCULATION ────────────────────────────────────
function calcHydrationNeed() {
  const weightKg = state.weightUnit === 'lb' ? state.weight * 0.453 : state.weight;

  // Base: minutes elapsed since wake time or last drink
  const now = new Date();
  const [wH, wM] = state.wakeTime.split(':').map(Number);
  const wakeToday = new Date(); wakeToday.setHours(wH, wM, 0, 0);

  let refTime = wakeToday;
  if (state.lastDrink) {
    const lastD = new Date(state.lastDrink);
    if (lastD > wakeToday) refTime = lastD;
  }

  const minutesSince = Math.max(0, (now - refTime) / 60000);

  // Awake hours total
  const [sH, sM] = state.sleepTime.split(':').map(Number);
  let sleepToday = new Date(); sleepToday.setHours(sH, sM, 0, 0);
  if (sleepToday < wakeToday) sleepToday.setDate(sleepToday.getDate() + 1);
  const awakeMinutes = Math.max(1, (sleepToday - wakeToday) / 60000);

  // Time score (0-80) — real-world thresholds
  // 0-60 min   → 0-15   (thriving, just drank)
  // 60-120 min → 15-35  (still ok)
  // 120-180 min → 35-55 (getting stressed)
  // 180-240 min → 55-70 (visibly wilting)
  // 240+ min   → 70-80  (critical)
  let timeScore = 0;
  if (minutesSince <= 60) {
    timeScore = (minutesSince / 60) * 15;
  } else if (minutesSince <= 120) {
    timeScore = 15 + ((minutesSince - 60) / 60) * 20;
  } else if (minutesSince <= 180) {
    timeScore = 35 + ((minutesSince - 120) / 60) * 20;
  } else if (minutesSince <= 240) {
    timeScore = 55 + ((minutesSince - 180) / 60) * 15;
  } else {
    timeScore = Math.min(80, 70 + ((minutesSince - 240) / 60) * 5);
  }

  // Temperature score (0-15) — reduced weight
  const temp = state.weatherTemp ?? 28;
  let tempScore = 0;
  if (temp >= 40) tempScore = 15;
  else if (temp >= 37) tempScore = 12;
  else if (temp >= 33) tempScore = 8;
  else if (temp >= 28) tempScore = 4;
  else tempScore = 1;

  // Deficit score (0-10) — behind daily target?
  const dailyMl = weightKg * 35;
  const glassesNeeded = dailyMl / 250;
  const hoursAwakeSoFar = Math.min(awakeMinutes, (now - wakeToday) / 60000) / 60;
  const expectedByNow = Math.max(0, (hoursAwakeSoFar / (awakeMinutes / 60)) * glassesNeeded);
  const deficit = Math.max(0, expectedByNow - state.glassesToday);
  const deficitScore = Math.min(10, deficit * 4);

  const total = Math.min(100, Math.round(timeScore + tempScore + deficitScore));
  return total;
}

// ─── PLANT STAGES ─────────────────────────────────────────
function getStage(score) {
  if (score < 25) return 0;
  if (score < 50) return 1;
  if (score < 75) return 2;
  return 3;
}

const stageData = [
  { label: 'Thriving', sub: 'fully hydrated', glow: '#6ab86a', barColor: '#6ab86a' },
  { label: 'Drooping', sub: 'needs water soon', glow: '#a8c870', barColor: '#b8b860' },
  { label: 'Stressed', sub: 'please drink water', glow: '#c8a850', barColor: '#c89840' },
  { label: 'Critical', sub: 'drink water now ⚠️', glow: '#b87840', barColor: '#b86030' },
];

function drawPlant(stage) {
  const svg = document.getElementById('plant-svg');
  svg.innerHTML = plantSVG(stage);
}

function plantSVG(stage) {
  // Pot base (same for all)
  const pot = `
    <path d="M55 180 L62 210 L98 210 L105 180 Z" fill="#d8d0c0"/>
    <rect x="50" y="172" width="60" height="12" rx="6" fill="#c8c0b0"/>
    <ellipse cx="80" cy="180" rx="28" ry="6" fill="#b8a898"/>
  `;

  if (stage === 0) return pot + `
    <line x1="80" y1="178" x2="80" y2="118" stroke="#5a9e5a" stroke-width="4" stroke-linecap="round"/>
    <path d="M80 148 Q55 136 40 118" stroke="#5a9e5a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M80 140 Q105 128 120 108" stroke="#5a9e5a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="80" cy="100" rx="26" ry="34" fill="#5a9e5a" transform="rotate(-5 80 100)"/>
    <ellipse cx="80" cy="100" rx="16" ry="26" fill="#7ec87e" transform="rotate(-5 80 100)"/>
    <ellipse cx="38" cy="116" rx="18" ry="12" fill="#5a9e5a" transform="rotate(-35 38 116)"/>
    <ellipse cx="122" cy="104" rx="18" ry="12" fill="#5a9e5a" transform="rotate(30 122 104)"/>
    <ellipse cx="66" cy="74" rx="12" ry="9" fill="#82d882" transform="rotate(-20 66 74)"/>
    <ellipse cx="94" cy="70" rx="12" ry="9" fill="#82d882" transform="rotate(18 94 70)"/>
    <ellipse cx="80" cy="62" rx="8" ry="6" fill="#a0e0a0"/>
  `;

  if (stage === 1) return pot + `
    <path d="M80 178 Q78 158 76 128" stroke="#7aae7a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M78 155 Q62 158 48 170" stroke="#7aae7a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M77 148 Q94 152 108 164" stroke="#7aae7a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="74" cy="110" rx="22" ry="30" fill="#8abf8a" transform="rotate(12 74 110)"/>
    <ellipse cx="74" cy="110" rx="14" ry="22" fill="#a8d8a8" transform="rotate(12 74 110)"/>
    <ellipse cx="46" cy="168" rx="16" ry="10" fill="#8abf8a" transform="rotate(22 46 168)"/>
    <ellipse cx="110" cy="162" rx="16" ry="10" fill="#8abf8a" transform="rotate(-18 110 162)"/>
    <ellipse cx="62" cy="86" rx="10" ry="7" fill="#a8d0a8" transform="rotate(-15 62 86)"/>
    <ellipse cx="86" cy="84" rx="10" ry="7" fill="#a8d0a8" transform="rotate(22 86 84)"/>
  `;

  if (stage === 2) return pot + `
    <path d="M80 178 Q76 160 72 135 Q70 122 68 108" stroke="#a89860" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M74 152 Q58 160 44 174" stroke="#a89860" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M72 144 Q88 154 100 168" stroke="#a89860" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="60" cy="96" rx="18" ry="26" fill="#c0a848" transform="rotate(30 60 96)"/>
    <ellipse cx="60" cy="96" rx="10" ry="18" fill="#d8c068" transform="rotate(30 60 96)"/>
    <ellipse cx="42" cy="172" rx="14" ry="8" fill="#b89840" transform="rotate(18 42 172)"/>
    <ellipse cx="102" cy="168" rx="14" ry="8" fill="#b89840" transform="rotate(-12 102 168)"/>
    <path d="M64 76 Q58 68 62 62" stroke="#b0a050" stroke-width="2" fill="none" stroke-linecap="round"/>
  `;

  if (stage === 3) return pot + `
    <path d="M80 178 Q74 162 70 145 Q67 132 64 115 Q62 105 60 92" stroke="#907848" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M68 156 Q52 166 38 180" stroke="#907848" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M66 148 Q80 160 92 175" stroke="#907848" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="52" cy="82" rx="14" ry="20" fill="#9a7840" transform="rotate(38 52 82)"/>
    <ellipse cx="52" cy="82" rx="7" ry="12" fill="#b09050" transform="rotate(38 52 82)"/>
    <ellipse cx="36" cy="180" rx="11" ry="6" fill="#907040" transform="rotate(22 36 180)"/>
    <ellipse cx="94" cy="176" rx="11" ry="6" fill="#907040" transform="rotate(-15 94 176)"/>
    <path d="M58 66 Q52 58 56 52" stroke="#907848" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M64 70 Q60 60 64 54" stroke="#907848" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  `;
}

// ─── UPDATE ALL ───────────────────────────────────────────
function updateAll() {
  const score = calcHydrationNeed();
  state.score = score;
  const stage = getStage(score);
  const sd = stageData[stage];

  // Plant
  drawPlant(stage);
  document.getElementById('plant-glow').style.background = sd.glow;

  // Labels
  document.getElementById('status-label').textContent = sd.label;
  document.getElementById('status-sub').textContent = sd.sub;

  // Score bar
  document.getElementById('score-display').textContent = score + '%';
  const bar = document.getElementById('score-bar');
  bar.style.width = score + '%';
  bar.style.background = sd.barColor;

  // Factors
  const temp = state.weatherTemp;
  document.getElementById('f-temp').textContent = temp != null ? temp + '°C' : '—';
  document.getElementById('weather-icon').textContent = weatherEmoji(state.weatherCode);
  document.getElementById('weather-text').textContent = temp != null ? temp + '°C' : '...';

  // Time since last drink
  if (state.lastDrink) {
    const mins = Math.floor((Date.now() - new Date(state.lastDrink)) / 60000);
    if (mins < 60) document.getElementById('f-time').textContent = mins + 'm';
    else document.getElementById('f-time').textContent = Math.floor(mins/60) + 'h ' + (mins%60) + 'm';
  } else {
    document.getElementById('f-time').textContent = 'none';
  }

  // Glasses
  document.getElementById('f-glasses').textContent = state.glassesToday + ' gl';

  // Last drink text
  if (state.lastDrink) {
    const mins = Math.floor((Date.now() - new Date(state.lastDrink)) / 60000);
    if (mins < 1) document.getElementById('last-drink-text').textContent = 'Just now — great job 🌿';
    else if (mins < 60) document.getElementById('last-drink-text').textContent = `Last drink ${mins} min ago`;
    else document.getElementById('last-drink-text').textContent = `Last drink ${Math.floor(mins/60)}h ${mins%60}m ago`;
  } else {
    document.getElementById('last-drink-text').textContent = 'No drinks logged yet today';
  }
}

// ─── LOG DRINK ────────────────────────────────────────────
function logDrink() {
  const today = new Date().toDateString();
  if (state.lastDrinkDate !== today) {
    state.glassesToday = 0;
    state.lastDrinkDate = today;
  }
  state.lastDrink = new Date().toISOString();
  state.glassesToday += 1;
  saveState();

  // Animate plant
  const svg = document.getElementById('plant-svg');
  svg.classList.remove('pulse');
  void svg.offsetWidth;
  svg.classList.add('pulse');

  const msgs = ['Stay hydrated 💧', 'Your plant thanks you 🌿', 'Keep it up!', 'Lovely 🌱'];
  showToast(msgs[Math.floor(Math.random() * msgs.length)]);
  updateAll();
}

// ─── TOAST ────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
